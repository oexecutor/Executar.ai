schema_version: "1.0.0"

common_output:
  type: object
  required: [ok, data, warnings, request_id]
  fields:
    ok: boolean
    data: object
    warnings: array
    request_id: string
    audit_id: {type: string, nullable: true}

tools:
  - name: desk_os_get_system_status
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    purpose: Return health, repository adapter, vault and schema status.
    input: {type: object, additionalProperties: false}

  - name: desk_os_search_context
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      required: [query]
      fields:
        query: {type: string, minLength: 1}
        project_id: {type: string, nullable: true}
        types: {type: array, items: string}
        limit: {type: integer, minimum: 1, maximum: 50, default: 10}

  - name: desk_os_list_projects
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      fields:
        status: {type: array, items: string}
        query: {type: string, nullable: true}
        limit: {type: integer, minimum: 1, maximum: 100, default: 25}

  - name: desk_os_get_project
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      required: [project_id]
      fields:
        project_id: {type: string}
        include: {type: array, items: string, default: [sprints, tasks, evidence, note_refs]}

  - name: desk_os_get_current_sprint
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      fields:
        project_id: {type: string, nullable: true}

  - name: desk_os_get_board
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      required: [sprint_id]
      fields:
        sprint_id: {type: string}
        include_completed: {type: boolean, default: true}

  - name: desk_os_get_today
    phase: MVP
    annotations: {readOnlyHint: true, destructiveHint: false, idempotentHint: true}
    input:
      fields:
        date: {type: date, nullable: true}
        project_id: {type: string, nullable: true}

  - name: desk_os_create_project
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [idempotency_key, title, objective, definition_of_done]
      fields:
        idempotency_key: {type: string}
        title: {type: string}
        objective: {type: string}
        definition_of_done: {type: array, minItems: 1, items: string}
        context: {type: string}
        priority: {type: string}
        note_refs: {type: array, items: string}

  - name: desk_os_update_project
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [project_id, expected_version, patch, idempotency_key]
      fields:
        project_id: {type: string}
        expected_version: {type: integer}
        patch: {type: object}
        idempotency_key: {type: string}

  - name: desk_os_create_sprint
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [project_id, title, goal, start_date, end_date, idempotency_key]
      fields:
        project_id: {type: string}
        title: {type: string}
        goal: {type: string}
        start_date: {type: date}
        end_date: {type: date}
        capacity_hours: {type: number, nullable: true}
        idempotency_key: {type: string}

  - name: desk_os_update_sprint
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [sprint_id, expected_version, patch, idempotency_key]
      fields:
        sprint_id: {type: string}
        expected_version: {type: integer}
        patch: {type: object}
        idempotency_key: {type: string}

  - name: desk_os_create_task
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [project_id, title, outcome, steps, idempotency_key]
      constraints: ["steps.length <= 3"]
      fields:
        project_id: {type: string}
        sprint_id: {type: string, nullable: true}
        title: {type: string}
        outcome: {type: string}
        acceptance_criteria: {type: array, items: string}
        priority: {type: string}
        steps: {type: array, maxItems: 3}
        idempotency_key: {type: string}

  - name: desk_os_update_task
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [task_id, expected_version, patch, idempotency_key]
      fields:
        task_id: {type: string}
        expected_version: {type: integer}
        patch: {type: object}
        idempotency_key: {type: string}

  - name: desk_os_move_task
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [task_id, target_status, target_position, expected_version, idempotency_key]
      fields:
        task_id: {type: string}
        target_status: {type: string}
        target_position: {type: number}
        expected_version: {type: integer}
        idempotency_key: {type: string}

  - name: desk_os_add_evidence
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [project_id, type, statement, source_refs, idempotency_key]
      fields:
        project_id: {type: string}
        task_id: {type: string, nullable: true}
        type: {type: string}
        statement: {type: string}
        source_refs: {type: array, items: string}
        confidence: {type: string}
        implications: {type: string}
        idempotency_key: {type: string}

  - name: desk_os_prepare_decomposition
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    purpose: Validate and persist a proposal; do not mutate operational project/sprint/task records.
    input:
      required: [project_id, proposal, idempotency_key]
      fields:
        project_id: {type: string}
        proposal: {type: object}
        idempotency_key: {type: string}

  - name: desk_os_apply_decomposition
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: true, idempotentHint: true}
    input:
      required: [proposal_id, expected_version, approved_by_user, idempotency_key]
      constraints: ["approved_by_user == true"]
      fields:
        proposal_id: {type: string}
        expected_version: {type: integer}
        approved_by_user: {type: boolean}
        idempotency_key: {type: string}
        approval_note: {type: string, nullable: true}

  - name: desk_os_close_sprint
    phase: MVP
    annotations: {readOnlyHint: false, destructiveHint: false, idempotentHint: true}
    input:
      required: [sprint_id, expected_version, review, idempotency_key]
      fields:
        sprint_id: {type: string}
        expected_version: {type: integer}
        review:
          type: object
          required: [outcome, evidence_refs, decision]
        idempotency_key: {type: string}
