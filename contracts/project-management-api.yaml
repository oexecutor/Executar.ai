openapi: 3.1.0
info:
  title: DESK-OS Project Management API
  version: 1.0.0
  description: HTTP adapter over the same application services exposed by MCP.
servers:
  - url: /api
paths:
  /pm/status:
    get:
      operationId: getSystemStatus
  /pm/projects:
    get:
      operationId: listProjects
    post:
      operationId: createProject
  /pm/projects/{projectId}:
    get:
      operationId: getProject
    patch:
      operationId: updateProject
  /pm/projects/{projectId}/evidence:
    post:
      operationId: addEvidence
  /pm/sprints:
    post:
      operationId: createSprint
  /pm/sprints/{sprintId}:
    get:
      operationId: getSprint
    patch:
      operationId: updateSprint
  /pm/sprints/{sprintId}/board:
    get:
      operationId: getBoard
  /pm/sprints/{sprintId}/close:
    post:
      operationId: closeSprint
  /pm/tasks:
    post:
      operationId: createTask
  /pm/tasks/{taskId}:
    patch:
      operationId: updateTask
  /pm/tasks/{taskId}/move:
    post:
      operationId: moveTask
  /pm/today:
    get:
      operationId: getToday
  /pm/context/search:
    get:
      operationId: searchContext
  /pm/decomposition/proposals:
    post:
      operationId: prepareDecomposition
  /pm/decomposition/proposals/{proposalId}/apply:
    post:
      operationId: applyDecomposition
components:
  securitySchemes:
    appSession:
      type: apiKey
      in: cookie
      name: session
  schemas:
    Error:
      type: object
      required: [code, message, request_id]
      properties:
        code: {type: string}
        message: {type: string}
        details: {type: object}
        request_id: {type: string}
security:
  - appSession: []
