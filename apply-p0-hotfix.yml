name: Apply P0 Vercel hotfix

on:
  push:
    paths:
      - .github/workflows/apply-p0-hotfix.yml
      - scripts/apply_vercel_hotfix.py
      - src/lib/vercel-node-adapter.ts
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Apply runtime and login-free patch
        run: python3 scripts/apply_vercel_hotfix.py

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build --if-present

      - name: Commit verified patch
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api src scripts
          git commit -m "fix(vercel): adapt runtime and open login-free workspace"
          git push origin HEAD:main
